# lychee link checker config — TOML format required by lychee
exclude = [
  "https://vercel.com/docs/concepts/projects/project-configuration",
  "https://vercel.com/docs/ai-gateway",
  "https://sdk.vercel.ai/docs",
  "https://vercel.com/docs/functions/runtimes/fluid-compute",
  "https://cloud.google.com/iam/docs/workload-identity-federation",
  "https://docs.github.com/en/actions/deployment/security-hardening-your-deployments/configuring-openid-connect-in-google-cloud-platform",
  "mailto:",
  # Relative links to files that only exist in apps repos
  "template-ai-app",
  # Local filesystem references
  "~/work/",
  # Private/historical repos — accessible to team members but not lychee
  "https://github.com/joserragonzalez/kairos",
]

exclude_path = ["CHANGELOG.md"]

accept = [200, 206, 429]
retry_wait_time = 10
max_retries = 3
timeout = 30
user_agent = "lychee/2.0"
