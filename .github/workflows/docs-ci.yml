name: Docs CI

on:
  pull_request:
    paths:
      - "docs/**"
      - "*.md"
      - ".markdownlint.json"
      - ".github/link-check-config.json"
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "*.md"

jobs:
  markdown-lint:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: |
            **/*.md
            !node_modules/**

  link-check:
    name: Link check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >
            --config .github/link-check-config.json
            --verbose
            --no-progress
            "**/*.md"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
